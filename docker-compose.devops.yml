version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: proyecto-backend
    environment:
      PORT: 5000
      CORS_ORIGIN: http://localhost
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
    container_name: proyecto-frontend
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - app_net

  nginx:
    image: nginx:1.27-alpine
    container_name: proyecto-edge
    depends_on:
      - frontend
      - backend
      - grafana
      - sonarqube
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - app_net

  sonarqube:
    image: sonarqube:lts-community
    container_name: proyecto-sonarqube
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    expose:
      - "9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    networks:
      - app_net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: proyecto-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    expose:
      - "9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - app_net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: proyecto-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_SERVER_ROOT_URL: %(protocol)s://%(domain)s/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - app_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: proyecto-cadvisor
    privileged: true
    expose:
      - "8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  grafana_data:
  sonar_data:
  sonar_extensions:
  sonar_logs:
