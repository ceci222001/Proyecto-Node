name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build


  jest:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm run test:coverage

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: CI=true npm test -- --coverage --runInBand --watchAll=false

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            backend/coverage
            frontend/coverage


  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: [test, jest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  k6-load-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start backend
        working-directory: backend
        run: node server.js > server.log 2>&1 &

      - name: Wait backend
        run: |
          for i in {1..30}; do
            if curl -sSf "http://localhost:5000/health" >/dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed"
          cat backend/server.log || true
          exit 1

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 test
        run: BASE_URL=http://localhost:5000 k6 run tests/k6/login-load.js

      - name: Upload k6 logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: backend/server.log


  build-and-push:
    runs-on: ubuntu-latest
    needs: [sonarqube, k6-load-test]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Normalize image names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_BACKEND=ghcr.io/$OWNER/proyecto-node-backend" >> "$GITHUB_ENV"
          echo "IMAGE_FRONTEND=ghcr.io/$OWNER/proyecto-node-frontend" >> "$GITHUB_ENV"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:main

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:main


  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.DOCKER_PRIVATE_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.NGINX_PRIVATE_HOST }} >> ~/.ssh/known_hosts

      # =========================
      # COPY VIA BASTION
      # =========================
      - name: Copy to docker server
        run: |
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no -J ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }}" \
            --exclude ".git" \
            --exclude "backend/node_modules" \
            --exclude "frontend/node_modules" \
            ./ \
            ${{ secrets.DOCKER_USER }}@${{ secrets.DOCKER_PRIVATE_HOST }}:${{ secrets.DOCKER_PROJECT_PATH }}

      # =========================
      # DEPLOY DOCKER STACK
      # =========================
      - name: Deploy stack
        run: |
          ssh -o StrictHostKeyChecking=no \
            -J ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }} \
            ${{ secrets.DOCKER_USER }}@${{ secrets.DOCKER_PRIVATE_HOST }} \
            "cd '${{ secrets.DOCKER_PROJECT_PATH }}' && docker compose -f docker-compose.gcp.yml up -d --build"

      # =========================
      # DEPLOY NGINX
      # =========================
      - name: Deploy nginx config
        run: |
          scp -o StrictHostKeyChecking=no \
            -o ProxyJump=${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }} \
            infra/nginx/gcp-servidor-nginx.conf \
            ${{ secrets.NGINX_USER }}@${{ secrets.NGINX_PRIVATE_HOST }}:/tmp/proyecto-node.conf

          ssh -o StrictHostKeyChecking=no \
            -J ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }} \
            ${{ secrets.NGINX_USER }}@${{ secrets.NGINX_PRIVATE_HOST }} \
            "sudo mv /tmp/proyecto-node.conf /etc/nginx/conf.d/proyecto-node.conf && sudo nginx -t && sudo systemctl reload nginx"
