name: DevOps Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  jest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests with coverage
        working-directory: backend
        run: npm run test:coverage

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: CI=true npm test -- --coverage --runInBand --watchAll=false

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            backend/coverage
            frontend/coverage

  k6-load-test:
    runs-on: ubuntu-latest
    needs: jest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start backend in background
        working-directory: backend
        run: |
          nohup npm start > backend.log 2>&1 &

      - name: Wait for backend healthcheck
        run: |
          timeout 30 bash -c 'until curl -fsS http://127.0.0.1:5000/health; do sleep 2; done'

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 smoke load
        run: BASE_URL=http://127.0.0.1:5000 k6 run tests/k6/login-load.js

  SonarQube-Scan:
    runs-on: ubuntu-latest
    needs:
      - jest
      - k6-load-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports

      - name: Check SonarQube secrets
        id: sonar-secrets
        run: |
          if [ -n "${{ secrets.SONAR_TOKEN }}" ] && [ -n "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarQube Scan
        if: steps.sonar-secrets.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - jest
      - k6-load-test
      - SonarQube-Scan
    if: ${{ always() && needs.jest.result == 'success' && needs.k6-load-test.result == 'success' && (needs.SonarQube-Scan.result == 'success' || needs.SonarQube-Scan.result == 'skipped') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/$OWNER/proyecto-node-backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/$OWNER/proyecto-node-frontend" >> $GITHUB_ENV

      - name: Login to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t $BACKEND_IMAGE:${{ github.sha }} -t $BACKEND_IMAGE:latest ./backend

      - name: Build frontend image
        run: docker build -t $FRONTEND_IMAGE:${{ github.sha }} -t $FRONTEND_IMAGE:latest ./frontend

      - name: Push backend image
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          docker push $BACKEND_IMAGE:${{ github.sha }}
          docker push $BACKEND_IMAGE:latest

      - name: Push frontend image
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          docker push $FRONTEND_IMAGE:${{ github.sha }}
          docker push $FRONTEND_IMAGE:latest

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}

      - name: Configure SSH jump host
        run: |
          mkdir -p ~/.ssh
          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ${{ secrets.BASTION_USER }}
            StrictHostKeyChecking no

          Host docker-private
            HostName ${{ secrets.DOCKER_PRIVATE_HOST }}
            User ${{ secrets.DOCKER_USER }}
            ProxyJump bastion
            StrictHostKeyChecking no

          Host nginx-private
            HostName ${{ secrets.NGINX_PRIVATE_HOST }}
            User ${{ secrets.NGINX_USER }}
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare remote directories
        run: |
          ssh docker-private "mkdir -p '${{ secrets.DOCKER_PROJECT_PATH }}'"

      - name: Sync repository to docker server
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "backend/node_modules" \
            --exclude "frontend/node_modules" \
            ./ docker-private:${{ secrets.DOCKER_PROJECT_PATH }}

      - name: Deploy application stack
        run: |
          ssh docker-private "
            set -eu
            cd '${{ secrets.DOCKER_PROJECT_PATH }}'
            docker compose -f docker-compose.gcp.yml up -d --build
          "

      - name: Publish nginx reverse proxy config
        run: |
          scp infra/nginx/gcp-servidor-nginx.conf nginx-private:/tmp/proyecto-node.conf
          ssh nginx-private "
            set -eu
            sudo mv /tmp/proyecto-node.conf /etc/nginx/conf.d/proyecto-node.conf
            sudo nginx -t
            sudo systemctl reload nginx
          "
